<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAO 翻译字典管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #ff4757; color: white; padding: 8px 16px; font-size: 0.85rem; }
        .btn-secondary { background: #6c757d; color: white; padding: 8px 16px; font-size: 0.85rem; }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab:hover { color: #667eea; background: rgba(102, 126, 234, 0.05); }
        .tab.active { color: #667eea; border-bottom-color: #667eea; background: rgba(102, 126, 234, 0.1); }
        
        .dictionary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e9ecef;
        }
        .dictionary-item:hover { background: #e9ecef; border-color: #dee2e6; }
        .dictionary-info { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex: 1; 
            flex-wrap: wrap; 
            padding: 4px 0; 
        }
        .dictionary-key { font-weight: 600; color: #667eea; min-width: 120px; }
        .dictionary-value { color: #666; flex: 1; min-width: 100px; max-width: 200px; }
        .dictionary-shorten { color: #999; font-size: 0.85rem; background: #e9ecef; padding: 4px 8px; border-radius: 4px; margin-right: 16px; }
        
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .message.success { background: #d4edda; color: #155724; display: flex; }
        .message.error { background: #f8d7da; color: #721c24; display: flex; }
        .message.info { background: #d1ecf1; color: #0c5460; display: flex; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.9rem; opacity: 0.9; }
        
        .add-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }
        .form-row .form-group { margin-bottom: 0; }
        
        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .search-box input:focus { outline: none; border-color: #667eea; }
        
        .edit-form { display: flex; gap: 8px; flex: 1; align-items: center; }
        .edit-form input { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 0.9rem; }
        .edit-form input:focus { outline: none; border-color: #667eea; }
        
        .actions { display: flex; gap: 8px; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .auto-save-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: #28a745; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        
        /* 进化监控样式 */
        .evo-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e9ecef;
        }
        .evo-card:hover { background: #e9ecef; border-color: #dee2e6; }
        .evo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .evo-name {
            font-weight: 600; color: #333;
        }
        .evo-time {
            font-size: 0.85rem; color: #666;
        }
        .evo-actions {
            display: flex; gap: 8px;
        }
        .new-tag {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; flex-wrap: nowrap; }
            .tab { white-space: nowrap; }
            .dictionary-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 OAO 翻译字典管理</h1>
            <p>管理 built-in-dictionaries.json 和 evolutions.json</p>
        </div>

        <!-- 配置卡片 -->
        <div class="card">
            <h2 class="section-title">⚙️ 配置</h2>
            <div class="form-group">
                <label>Gitee 私人令牌 (Access Token)</label>
                <input type="password" id="giteeToken" placeholder="请输入你的Gitee私人令牌">
                <small style="color: #999; display: block; margin-top: 4px;">令牌仅保存在本地浏览器中</small>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="loadAllData()">
                    <span>📥 加载所有数据</span>
                </button>
            </div>
        </div>

        <!-- FUTBIN进化监控 -->
        <div class="card">
            <h2 class="section-title">⚡ FUTBIN进化监控</h2>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <!-- 状态卡片 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef;">
                        <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">上次检查</div>
                        <div style="font-size: 1.2rem; font-weight: 600; color: #333;" id="evo-last-check">--</div>
                    </div>
                    <div style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef;">
                        <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">下次检查</div>
                        <div style="font-size: 1.2rem; font-weight: 600; color: #333;" id="evo-next-check">次日 02:30</div>
                    </div>
                    <div style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef;">
                        <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">今日发现</div>
                        <div style="font-size: 1.2rem; font-weight: 600; color: #333;" id="evo-today-count">0</div>
                    </div>
                    <div style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef;">
                        <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">历史总数</div>
                        <div style="font-size: 1.2rem; font-weight: 600; color: #333;" id="evo-total-count">0</div>
                    </div>
                </div>

                <!-- 控制按钮 -->
                <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 10px; height: 10px; border-radius: 50%; background: #28a745; box-shadow: 0 0 8px #28a745; animation: blink 1.5s infinite;" id="evo-status-dot"></div>
                        <span id="evo-status-text">运行中</span>
                    </div>
                    <button class="btn btn-primary" id="evo-check-now-btn" onclick="evoCheckEvolutions()">
                        <span>🔄 立即检查</span>
                    </button>
                </div>

                <!-- 最新发现 -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="color: #333; font-size: 1.1rem;">📅 今日最新发现</h3>
                        <button class="btn btn-secondary" onclick="evoClearToday()">
                            <span>清空今日</span>
                        </button>
                    </div>
                    <div id="evo-new-list" style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef; max-height: 400px; overflow-y: auto;">
                        <div style="text-align: center; color: #999; padding: 32px 0;">
                            <p>暂无新进化</p>
                        </div>
                    </div>
                </div>

                <!-- 运行日志 -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <h3 style="color: #333; font-size: 1.1rem;">📋 运行日志</h3>
                        <button class="btn btn-secondary" onclick="evoClearLogs()">
                            <span>清空日志</span>
                        </button>
                    </div>
                    <div id="evo-log-container" style="background: #f8f9fa; border-radius: 8px; padding: 16px; border: 1px solid #e9ecef; font-family: monospace; font-size: 0.9rem; max-height: 200px; overflow-y: auto;">
                        <div style="color: #666;">[系统] 监控服务已启动</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- 字典管理卡片 -->
        <div class="card" id="dictionaryCard" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <h2 class="section-title" style="margin: 0; border: none; padding: 0;">📚 内置字典管理</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="auto-save-toggle" style="margin: 0;">
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoSave" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span>自动保存</span>
                    </div>
                    <button class="btn btn-primary" onclick="saveDictionaries()">
                        <span>💾 手动保存</span>
                    </button>
                </div>
            </div>
            
            <!-- 统计信息 -->
            <div class="stats" id="statsContainer"></div>

            <!-- 标签页 -->
            <div class="tabs" id="categoryTabs">
                <button class="tab active" data-category="basic" onclick="switchTab('basic')">基础信息</button>
                <button class="tab" data-category="sixStat" onclick="switchTab('sixStat')">六维数据</button>
                <button class="tab" data-category="roles" onclick="switchTab('roles')">角色</button>
                <button class="tab" data-category="chemistry" onclick="switchTab('chemistry')">化学</button>
                <button class="tab" data-category="playstyles" onclick="switchTab('playstyles')">特技</button>
                <button class="tab" data-category="futgg" onclick="switchTab('futgg')">FUTGG</button>
                <button class="tab" data-category="futbin" onclick="switchTab('futbin')">FUTBIN</button>
                <button class="tab" data-category="easysbc" onclick="switchTab('easysbc')">EASYSBC</button>
                <button class="tab" data-category="evolutions" onclick="switchTab('evolutions')">进化</button>
            </div>

            <!-- 添加表单 -->
            <div class="add-form">
                <h3 style="margin-bottom: 16px; color: #333;">➕ 添加新条目</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>英文键 (Key)</label>
                        <input type="text" id="newKey" placeholder="例如：Striker">
                    </div>
                    <div class="form-group">
                        <label>中文翻译</label>
                        <input type="text" id="newValue" placeholder="例如：前锋">
                    </div>
                    <button class="btn btn-success" onclick="addEntry()">添加</button>
                </div>
                <div class="form-row" style="margin-top: 12px;">
                    <div class="form-group">
                        <label>简称 (可选)</label>
                        <input type="text" id="newShorten" placeholder="例如：ST">
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="newCategory">
                            <option value="basic">基础信息</option>
                            <option value="sixStat">六维数据</option>
                            <option value="roles">角色</option>
                            <option value="chemistry">化学</option>
                            <option value="playstyles">特技</option>
                            <option value="futgg">FUTGG</option>
                            <option value="futbin">FUTBIN</option>
                            <option value="easysbc">EASYSBC</option>
                            <option value="evolutions">进化</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索键或翻译内容..." oninput="filterEntries()">
            </div>

            <!-- 字典列表 -->
            <div id="dictionaryList" class="dictionary-list"></div>
        </div>


    </div>

    <script>
        const GITEE_OWNER = 'rickma11';
        const GITEE_REPO = 'OAO-evotrans';
        const GITEE_BRANCH = 'master';
        
        const DICT_PATH = 'built-in-dictionaries.json';
        const EVO_PATH = 'evolutions.json';

        let currentDictionaries = {};
        let currentEvolutions = {};
        let dictSha = '';
        let evoSha = '';
        let currentCategory = 'basic';

        const categoryNames = {
            basic: '基础信息',
            sixStat: '六维数据',
            roles: '角色',
            chemistry: '化学',
            playstyles: '特技',
            futgg: 'FUTGG',
            futbin: 'FUTBIN',
            easysbc: 'EASYSBC',
            evolutions: '进化'
        };

        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            // 3秒后自动隐藏
            setTimeout(() => { msg.className = 'message'; }, 3000);
        }

        function getToken() {
            const token = document.getElementById('giteeToken').value.trim();
            if (!token) {
                showMessage('请输入Gitee私人令牌', 'error');
                return null;
            }
            return token;
        }

        // 解码 Base64
        function decodeBase64(base64) {
            try {
                return decodeURIComponent(escape(atob(base64)));
            } catch (e) {
                return atob(base64);
            }
        }

        // 编码 Base64
        function encodeBase64(text) {
            return btoa(unescape(encodeURIComponent(text)));
        }

        // 获取文件内容
        async function getFileContent(path, token) {
            const response = await fetch(
                `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${path}?ref=${GITEE_BRANCH}&access_token=${token}`
            );
            if (!response.ok) throw new Error(`获取文件失败(${response.status})`);
            const data = await response.json();
            return {
                content: JSON.parse(decodeBase64(data.content)),
                sha: data.sha
            };
        }

        // 保存文件
        async function saveFileContent(path, content, sha, token, message) {
            const jsonStr = JSON.stringify(content, null, 2);
            const base64Content = encodeBase64(jsonStr);
            
            const response = await fetch(
                `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${path}`,
                {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: token,
                        message: message,
                        content: base64Content,
                        sha: sha,
                        branch: GITEE_BRANCH
                    })
                }
            );
            
            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.message || `保存失败(${response.status})`);
            }
            
            const data = await response.json();
            return data.content.sha;
        }

        // 加载所有数据
        async function loadAllData() {
            const token = getToken();
            if (!token) return;

            showMessage('正在加载所有数据...', 'info');
            
            try {
                // 并行加载两个文件
                const [dictData, evoData] = await Promise.all([
                    getFileContent(DICT_PATH, token),
                    getFileContent(EVO_PATH, token)
                ]);
                
                currentDictionaries = dictData.content;
                dictSha = dictData.sha;
                
                currentEvolutions = evoData.content;
                evoSha = evoData.sha;
                
                // 初始化缺失分类
                Object.keys(categoryNames).forEach(cat => {
                    if (cat !== 'evolutions' && !currentDictionaries[cat]) {
                        currentDictionaries[cat] = {};
                    }
                });
                
                document.getElementById('dictionaryCard').style.display = 'block';
                updateStats();
                renderDictionaryList();
                showMessage('✅ 所有数据加载成功！', 'success');
            } catch (error) {
                console.error('加载错误:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        // 保存字典
        async function saveDictionaries() {
            const token = getToken();
            if (!token) return;

            showMessage('正在保存到 Gitee...', 'info');
            
            try {
                // 获取最新 SHA
                const latest = await getFileContent(DICT_PATH, token);
                dictSha = await saveFileContent(
                    DICT_PATH, 
                    currentDictionaries, 
                    latest.sha, 
                    token, 
                    'Update built-in-dictionaries.json via web manager'
                );
                showMessage('✅ 字典保存成功！', 'success');
            } catch (error) {
                console.error('保存错误:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        // 保存进化数据
        async function saveEvolutions() {
            const token = getToken();
            if (!token) return;

            showMessage('正在保存到 Gitee...', 'info');
            
            try {
                // 获取最新 SHA
                const latest = await getFileContent(EVO_PATH, token);
                evoSha = await saveFileContent(
                    EVO_PATH, 
                    currentEvolutions, 
                    latest.sha, 
                    token, 
                    'Update evolutions.json via web manager'
                );
                showMessage('✅ 进化数据保存成功！', 'success');
            } catch (error) {
                console.error('保存错误:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        // 自动保存字典
        async function autoSaveDictionaries() {
            if (!document.getElementById('autoSave').checked) return;
            await saveDictionaries();
        }

        // 自动保存进化
        async function autoSaveEvolutions() {
            if (!document.getElementById('autoSave').checked) return;
            await saveEvolutions();
        }

        // 更新统计
        function updateStats() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '';
            
            Object.keys(categoryNames).forEach(category => {
                let count = 0;
                if (category === 'evolutions') {
                    count = Object.keys(currentEvolutions).length;
                } else {
                    count = Object.keys(currentDictionaries[category] || {}).length;
                }
                
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `<div class="stat-value">${count}</div><div class="stat-label">${categoryNames[category]}</div>`;
                container.appendChild(item);
            });
        }



        // 切换标签
        function switchTab(category) {
            currentCategory = category;
            document.querySelectorAll('#categoryTabs .tab').forEach(tab => {

        // 渲染字典列表
        function renderDictionaryList() {
            const list = document.getElementById('dictionaryList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let entries = [];
            let dictionary = {};
            
            // 处理进化分类
            if (currentCategory === 'evolutions') {
                dictionary = currentEvolutions;
                entries = Object.entries(currentEvolutions).filter(([k, v]) => {
                    // 进化数据使用 CN 键
                    const translation = typeof v === 'object' && v.CN ? v.CN : v;
                    const text = `${k} ${translation}`.toLowerCase();
                    return text.includes(search);
                });
            } else {
                // 处理其他分类
                dictionary = currentDictionaries[currentCategory] || {};
                entries = Object.entries(dictionary).filter(([k, v]) => {
                    const translation = typeof v === 'object' && v.webpagedata ? v.webpagedata : v;
                    const text = `${k} ${translation} ${(typeof v === 'object' && v.shorten) || ''}`.toLowerCase();
                    return text.includes(search);
                });
            }

            // 按添加时间排序（新到旧）
            entries.sort((a, b) => {
                const timeA = (typeof a[1] === 'object' && a[1].timestamp) || 0;
                const timeB = (typeof b[1] === 'object' && b[1].timestamp) || 0;
                return timeB - timeA; // 降序排列，新的在前
            });

            if (entries.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>${search ? '没有找到匹配的条目' : '该分类暂无数据'}</p></div>`;
                return;
            }

            list.innerHTML = entries.map(([key, value]) => {
                // 确保正确处理值
                let translation, shorten;
                if (currentCategory === 'evolutions') {
                    // 进化数据使用 CN 键
                    translation = typeof value === 'object' && value.CN ? value.CN : value;
                    shorten = ''; // 进化数据没有 shorten
                } else {
                    translation = typeof value === 'object' && value.webpagedata ? value.webpagedata : value;
                    shorten = typeof value === 'object' && value.shorten ? value.shorten : '';
                }
                
                return `
                <div class="dictionary-item" data-key="${key}">
                    <div class="dictionary-info">
                        <span class="dictionary-key">${key}</span>
                        <span class="arrow" style="margin: 0 12px; color: #667eea; font-size: 1.1em; font-weight: 500;">→</span>
                        <span class="dictionary-value">${translation}</span>
                        ${shorten ? `<span class="dictionary-shorten">[${shorten}]</span>` : ''}
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="${currentCategory === 'evolutions' ? 'editEvolution' : 'editEntry'}('${key}')">编辑</button>
                        <button class="btn btn-danger" onclick="${currentCategory === 'evolutions' ? 'deleteEvolution' : 'deleteEntry'}('${key}')">删除</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function evoFetchWithProxy(url) {
            for (let i = 0; i < EVO_CONFIG.CORS_PROXIES.length; i++) {
                const proxyIndex = (evoCurrentProxyIndex + i) % EVO_CONFIG.CORS_PROXIES.length;
                const proxyConfig = EVO_CONFIG.CORS_PROXIES[proxyIndex];
                const proxyUrl = proxyConfig.encode 
                    ? proxyConfig.url + encodeURIComponent(url) 
                    : proxyConfig.url + url;
                try {
                    evoAddLog('抓取', `尝试代理 ${proxyIndex + 1}/${EVO_CONFIG.CORS_PROXIES.length}`);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    
                    const response = await fetch(proxyUrl, {
                        signal: controller.signal,
                        mode: 'cors',
                        headers: {
                            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                        }
                    });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        evoCurrentProxyIndex = proxyIndex;
                        evoAddLog('抓取', `代理 ${proxyIndex + 1} 连接成功`);
                        return await response.text();
                    } else {
                        evoAddLog('错误', `代理 ${proxyIndex + 1} 返回状态: ${response.status}`);
                    }
                } catch (e) {
                    if (e.name === 'AbortError') {
                        evoAddLog('错误', `代理 ${proxyIndex + 1} 超时`);
                    } else {
                        evoAddLog('错误', `代理 ${proxyIndex + 1} 失败: ${e.message}`);
                    }
                }
            }
            throw new Error('所有代理均失败，请检查网络连接或稍后重试');
        }

        function evoParseHtmlContent(html) {
            const evolutions = [];
            try {
                // 解析页面内容
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 查找进化链接
                const links = doc.querySelectorAll('a[href*="/evolutions/"]');
                evoAddLog('抓取', `共检查 ${links.length} 个链接`);
                
                let foundLinks = new Set();
                
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !foundLinks.has(href)) {
                        foundLinks.add(href);
                        
                        // 检查是否有NEW标签（使用与FUTBIN-evo相同的选择器）
                        const hasNewTag = link.querySelector('.evolution-badge.positive, .evolution-badge.bold.positive, [class*="new"], [class*="NEW"]') || 
                                       Array.from(link.querySelectorAll('span')).some(span => 
                                           span.textContent.toUpperCase().includes('NEW'));
                        
                        if (hasNewTag) {
                            // 提取进化名称
                            let name = '';
                            const nameElement = link.querySelector('.xs-font.text-center, [class*="text"]');
                            if (nameElement) {
                                name = nameElement.textContent.trim();
                            } else {
                                // 尝试从整个链接文本中提取
                                name = link.textContent.trim();
                            }
                            
                            // 移除new相关文本
                            name = name.replace(/new/gi, '').replace(/NEW/g, '').trim();
                            // 移除多余的空白字符
                            name = name.replace(/\s+/g, ' ').trim();
                            
                            // 过滤掉不需要的内容
                            const isInvalid = name.includes('Rewards') || 
                                            name.includes('Expires') || 
                                            name.includes('Unlock') || 
                                            name.includes('Free Repeatable') ||
                                            name.includes('Celebrate') ||
                                            name.includes('Step into') ||
                                            name.includes('UNLOCK') ||
                                            name.length < 3 ||
                                            name.length > 200;
                            
                            if (!isInvalid) {
                                const url = href.startsWith('http') ? href : `https://www.futbin.com${href}`;
                                evolutions.push({
                                    name: name,
                                    url: url
                                });
                                evoAddLog('发现', `检测到新进化: ${name}`);
                            }
                        }
                    }
                });
                
                evoAddLog('抓取', `找到 ${evolutions.length} 个进化链接，其中 ${evolutions.length} 个带有NEW标签`);
            } catch (e) {
                evoAddLog('错误', `解析失败: ${e.message}`);
            }
            return evolutions;
        }

        function evoParseHtmlContentDirect(html) {
            const evolutions = [];
            try {
                // 解析页面内容
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 查找进化链接
                const links = doc.querySelectorAll('a[href*="/evolutions/"]');
                evoAddLog('抓取', `共检查 ${links.length} 个链接（直接解析模式）`);
                
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    const name = link.textContent.trim();
                    
                    if (name && href && !name.includes('http')) {
                        // 过滤掉不需要的内容
                        const isInvalid = name.includes('Rewards') || 
                                        name.includes('Expires') || 
                                        name.includes('Unlock') || 
                                        name.includes('Free Repeatable') ||
                                        name.includes('Celebrate') ||
                                        name.includes('Step into') ||
                                        name.includes('UNLOCK') ||
                                        name.includes('Evolution') ||
                                        name.includes('evolution') ||
                                        name.length < 5;
                        
                        // 只保留看起来像进化名称的内容
                        if (!isInvalid && href.match(/\/evolutions\/\d+/)) {
                            evolutions.push({
                                name: name,
                                url: href.startsWith('http') ? href : `https://www.futbin.com${href}`
                            });
                        }
                    }
                });
                
                // 去重
                const uniqueEvolutions = [];
                const seenNames = new Set();
                evolutions.forEach(evo => {
                    if (!seenNames.has(evo.name)) {
                        seenNames.add(evo.name);
                        uniqueEvolutions.push(evo);
                    }
                });
                
                evoAddLog('抓取', `直接从页面获取到 ${uniqueEvolutions.length} 个进化`);
                return uniqueEvolutions;
            } catch (e) {
                evoAddLog('错误', `直接解析失败: ${e.message}`);
                return [];
            }
        }

        async function evoFetchFuttoEvolutions() {
            try {
                const data = await evoFetchWithProxy(EVO_CONFIG.FUTTO_API_URL);
                
                // 检查返回内容是否是JSON
                if (data.startsWith('<')) {
                    evoAddLog('错误', 'FUTTO API返回HTML而不是JSON，可能被VPN广告拦截');
                    return null;
                }
                
                return JSON.parse(data);
            } catch (e) {
                evoAddLog('错误', `FUTTO API抓取失败: ${e.message}`);
                return null;
            }
        }

        async function evoFetchFuttoEvolutionDetails(evolutionIds) {
            const evolutions = [];
            evoAddLog('抓取', `开始获取 ${evolutionIds.length} 个进化的详细信息`);
            
            for (const id of evolutionIds) {
                try {
                    const url = `https://api.fut.to/26/evolution/${id}.json`;
                    const data = await evoFetchWithProxy(url);
                    
                    // 检查返回内容是否是JSON
                    if (data.startsWith('<')) {
                        evoAddLog('抓取', `进化 ${id} 返回HTML，跳过`);
                        continue;
                    }
                    
                    const evoData = JSON.parse(data);
                    if (evoData.name) {
                        evolutions.push({
                            name: evoData.name,
                            url: `https://www.futbin.com/26/evolutions/${id}`
                        });
                        evoAddLog('抓取', `成功获取进化 ${id}: ${evoData.name}`);
                    }
                } catch (e) {
                    // 只记录非HTML错误
                    if (!e.message.includes('Unexpected token <')) {
                        evoAddLog('错误', `进化 ${id} 详情获取失败: ${e.message}`);
                    } else {
                        evoAddLog('抓取', `进化 ${id} 解析失败，跳过`);
                    }
                }
            }
            
            evoAddLog('抓取', `成功获取 ${evolutions.length} 个进化的详细信息`);
            return evolutions;
        }

        function evoClearToday() {
            if (confirm('确定要清空今日的进化记录吗？')) {
                const today = new Date().toLocaleDateString('zh-CN');
                evoHistory = evoHistory.filter(item => item.date !== today);
                evoSaveHistory();
                evoUpdateUI();
                evoAddLog('系统', '今日进化记录已清空');
            }
        }

        function evoStartScheduler() {
            function checkSchedule() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                
                if (hours === EVO_CONFIG.TARGET_HOUR && minutes === EVO_CONFIG.TARGET_MINUTE) {
                    evoCheckEvolutions();
                }
            }
            
            // 每分钟检查一次
            setInterval(checkSchedule, 60000);
        }

        function evoClearLogs() {
            evoLogs = [];
            evoSaveLogs();
            evoRenderLogs();
        }
    </script>
</body>
