<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAO 进化名称管理 - 测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
            width: auto;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .evolution-list {
            margin-top: 20px;
        }

        .evolution-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .evolution-item:hover {
            background: #e9ecef;
            transform: translateX(4px);
        }

        .evolution-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .evolution-en {
            font-weight: 600;
            color: #667eea;
            font-size: 1.1rem;
        }

        .evolution-zh {
            color: #666;
            font-size: 0.95rem;
        }

        .arrow {
            color: #999;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: flex;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: flex;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .token-input {
            margin-bottom: 20px;
        }

        .token-input input {
            font-family: monospace;
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .futbin-card {
            border-left: 4px solid #4CAF50;
        }

        .futbin-item {
            background: #f0f9ff;
            border-left: 4px solid #3498db;
        }

        .futbin-item:hover {
            background: #e3f2fd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 OAO 进化名称管理 - 测试版</h1>
            <p>轻松管理进化中英文对照表</p>
        </div>

        <!-- 第一行：配置模块和 FUTBIN 进化抓取模块并排 -->
        <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
            <!-- 响应式样式 -->
            <style>
                @media (max-width: 768px) {
                    .card {
                        flex: 100% !important;
                    }
                }
            </style>
            <!-- 配置模块 -->
            <div class="card" style="flex: 1;">
                <h2 class="section-title">⚙️ 配置</h2>
                <div class="form-group token-input">
                    <label>Gitee 私人令牌 (Access Token)</label>
                    <input type="password" id="giteeToken" placeholder="请输入你的Gitee私人令牌">
                    <small style="color: #999; display: block; margin-top: 4px;">令牌仅保存在本地浏览器中，不会上传到服务器</small>
                </div>
                <button class="btn btn-primary" onclick="loadEvolutions()">
                    <span>加载进化列表</span>
                </button>
            </div>

            <!-- FUTBIN 进化抓取功能 -->
            <div class="card futbin-card" style="flex: 1;">
                <h2 class="section-title">⚡ FUTBIN 进化抓取</h2>
                <p style="margin-bottom: 20px; color: #666;">从 FUTBIN 网站抓取最新的进化信息</p>
                <button class="btn btn-primary" onclick="loadFutbinEvolutions()">
                    <span>加载 FUTBIN 进化</span>
                </button>
                <div id="futbinEvolutions" class="evolution-list" style="margin-top: 20px;">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                        </svg>
                        <p>点击上方按钮加载 FUTBIN 进化信息</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="card" id="addCard" style="display: none;">
            <h2 class="section-title">➕ 添加进化</h2>
            <div class="form-group">
                <label>英文名称</label>
                <input type="text" id="enName" placeholder="例如：Fire Dragon">
            </div>
            <div class="form-group">
                <label>中文名称</label>
                <input type="text" id="zhName" placeholder="例如：火龙">
            </div>
            <button class="btn btn-primary" onclick="addEvolution()">
                <span>添加进化</span>
            </button>
        </div>

        <div class="card" id="listCard" style="display: none;">
            <h2 class="section-title">📋 进化列表</h2>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总进化数</div>
                </div>
            </div>
            <div id="evolutionList" class="evolution-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p>暂无进化数据，请先添加</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GITEE_OWNER = 'rickma11';
        const GITEE_REPO = 'OAO-evotrans';
        const GITEE_PATH = 'evolutions.json';
        const GITEE_BRANCH = 'master';

        let currentEvolutions = {};
        let evolutionOrder = [];
        let currentSha = '';

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.innerHTML = '<span class="loading"></span>';
                btn.disabled = true;
            } else {
                btn.innerHTML = '<span>加载进化列表</span>';
                btn.disabled = false;
            }
        }

        async function loadEvolutions() {
            const token = document.getElementById('giteeToken').value.trim();
            if (!token) {
                showMessage('请输入Gitee私人令牌', 'error');
                return;
            }

            const btn = document.querySelector('button[onclick="loadEvolutions()"]');
            setLoading(btn, true);

            try {
                console.log('开始加载，URL:', `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${GITEE_PATH}?ref=${GITEE_BRANCH}`);
                
                const response = await fetch(
                    `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${GITEE_PATH}?ref=${GITEE_BRANCH}&access_token=${token}`
                );

                console.log('响应状态:', response.status, response.statusText);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('错误详情:', errorData);
                    throw new Error(`加载失败(${response.status})：${errorData.message || response.statusText}`);
                }

                const data = await response.json();
                console.log('获取到的数据:', data);
                
                if (!data.content) {
                    throw new Error('响应中没有content字段');
                }
                
                currentSha = data.sha;
                
                // 正确解码Base64（支持UTF-8）
                let content;
                try {
                    content = decodeURIComponent(escape(atob(data.content)));
                } catch (e) {
                    console.error('Base64解码失败:', e);
                    // 尝试直接解码
                    content = atob(data.content);
                }
                
                console.log('解码后的内容:', content);
                currentEvolutions = JSON.parse(content);
                
                // 初始化进化顺序数组
                evolutionOrder = Object.keys(currentEvolutions);
                console.log('进化顺序:', evolutionOrder);

                renderEvolutionList();
                
                document.getElementById('addCard').style.display = 'block';
                document.getElementById('listCard').style.display = 'block';
                
                showMessage('加载成功！', 'success');
            } catch (error) {
                console.error('完整错误:', error);
                showMessage('加载失败：' + error.message, 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        function renderEvolutionList() {
            console.log('渲染列表，currentEvolutions:', currentEvolutions);
            
            const list = document.getElementById('evolutionList');
            const keys = evolutionOrder.length > 0 ? evolutionOrder : Object.keys(currentEvolutions);
            
            console.log('进化数量:', keys.length);
            console.log('渲染顺序:', keys);
            
            // 调试第一个进化的数据结构
            if (keys.length > 0) {
                console.log('第一个进化的键:', keys[0]);
                console.log('第一个进化的数据:', currentEvolutions[keys[0]]);
                console.log('第一个进化的数据类型:', typeof currentEvolutions[keys[0]]);
                console.log('第一个进化是否是对象:', currentEvolutions[keys[0]] instanceof Object);
            }
            
            document.getElementById('totalCount').textContent = keys.length;

            if (keys.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>暂无进化数据，请先添加</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = keys.map(key => {
                const evolution = currentEvolutions[key];
                let enName = key;
                let zhName = '';
                
                // 检查数据结构
                if (evolution && typeof evolution === 'object') {
                    // 尝试获取各种可能的中文字段
                    zhName = evolution.CN || evolution.cn || evolution.zh || evolution.ZH || JSON.stringify(evolution);
                } else if (evolution) {
                    // 如果不是对象，直接作为中文
                    zhName = evolution;
                }
                
                console.log('处理进化:', key, zhName);
                
                return `
                <div class="evolution-item">
                    <div class="evolution-info">
                        <span class="evolution-en">${escapeHtml(enName)}</span>
                        <span class="arrow">→</span>
                        <span class="evolution-zh">${escapeHtml(zhName)}</span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteEvolution('${escapeHtml(key)}')">删除</button>
                </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyEvolutionName(name) {
            navigator.clipboard.writeText(name).then(() => {
                showMessage('复制成功！', 'success');
            }).catch(err => {
                console.error('复制失败:', err);
                showMessage('复制失败，请手动复制', 'error');
            });
        }

        async function addEvolution() {
            const token = document.getElementById('giteeToken').value.trim();
            const enName = document.getElementById('enName').value.trim();
            const zhName = document.getElementById('zhName').value.trim();

            if (!enName || !zhName) {
                showMessage('请输入英文和中文名称', 'error');
                return;
            }

            const btn = document.querySelector('#addCard button');
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            try {
                // 将新进化添加到进化顺序数组的开头
                if (!evolutionOrder.includes(enName)) {
                    evolutionOrder.unshift(enName);
                } else {
                    // 如果已存在，先移除再添加到开头
                    evolutionOrder = evolutionOrder.filter(key => key !== enName);
                    evolutionOrder.unshift(enName);
                }
                
                // 更新进化数据
                currentEvolutions[enName] = { "CN": zhName };
                
                console.log('添加后进化顺序:', evolutionOrder);

                // 更新到Gitee
                await updateGiteeFile(token, `Add evolution: ${enName}`);

                // 清空输入
                document.getElementById('enName').value = '';
                document.getElementById('zhName').value = '';

                // 重新渲染列表
                renderEvolutionList();
                
                showMessage('添加成功！', 'success');
            } catch (error) {
                showMessage('添加失败：' + error.message, 'error');
                console.error(error);
            } finally {
                btn.innerHTML = '<span>添加进化</span>';
                btn.disabled = false;
            }
        }

        async function deleteEvolution(enName) {
            if (!confirm(`确定要删除 "${enName}" 吗？`)) {
                return;
            }

            const token = document.getElementById('giteeToken').value.trim();

            try {
                // 从进化顺序数组中移除
                evolutionOrder = evolutionOrder.filter(item => item !== enName);
                
                // 删除进化
                delete currentEvolutions[enName];

                // 更新到Gitee
                await updateGiteeFile(token, `Remove evolution: ${enName}`);

                // 重新渲染列表
                renderEvolutionList();
                
                showMessage('删除成功！', 'success');
            } catch (error) {
                showMessage('删除失败：' + error.message, 'error');
                console.error(error);
            }
        }

        async function updateGiteeFile(token, message) {
            // 按照evolutionOrder的顺序重新组织数据
            const orderedEvolutions = {};
            for (const key of evolutionOrder) {
                if (currentEvolutions[key]) {
                    orderedEvolutions[key] = currentEvolutions[key];
                }
            }
            
            // 正确编码Base64（支持UTF-8）
            const jsonContent = JSON.stringify(orderedEvolutions, null, 2);
            const content = btoa(unescape(encodeURIComponent(jsonContent)));
            
            const response = await fetch(
                `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${GITEE_PATH}`,
                {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        access_token: token,
                        message: message,
                        content: content,
                        sha: currentSha,
                        branch: GITEE_BRANCH
                    })
                }
            );

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || '更新失败');
            }

            const data = await response.json();
            currentSha = data.content.sha;
        }

        // FUTBIN 进化抓取功能
        async function loadFutbinEvolutions() {
            const btn = document.querySelector('button[onclick="loadFutbinEvolutions()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            try {
                // 模拟 API 响应（本地模拟，无需 Vercel 部署）
                const mockEvolutions = [
                    {
                        id: 50,
                        content: "Birthday Warmup",
                        scraped_date: "2026-03-04",
                        url: "https://www.futbin.com/evolutions"
                    }
                ];

                console.log('FUTBIN 进化数据:', mockEvolutions);

                // 显示数据
                const container = document.getElementById('futbinEvolutions');
                
                if (!mockEvolutions || mockEvolutions.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                            </svg>
                            <p>暂无 FUTBIN 进化数据</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = mockEvolutions.map(evo => `
                        <div class="evolution-item futbin-item">
                            <div class="evolution-info">
                                <span class="evolution-en">${escapeHtml(evo.content)}</span>
                                <span class="arrow">→</span>
                                <span class="evolution-zh">${escapeHtml(evo.scraped_date)}</span>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 0.85rem; background: #4CAF50;" onclick="copyEvolutionName('${escapeHtml(evo.content)}')">复制</button>
                                <a href="${evo.url}" target="_blank" class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 0.85rem;">查看</a>
                            </div>
                        </div>
                    `).join('');
                }

                showMessage('FUTBIN 进化加载成功！', 'success');
            } catch (error) {
                console.error('FUTBIN 进化加载失败:', error);
                showMessage('FUTBIN 进化加载失败：' + error.message, 'error');
                document.getElementById('futbinEvolutions').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
                            <line x1="12" y1="9" x2="12" y2="13"></line>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        <p>加载失败，请稍后重试</p>
                    </div>
                `;
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 页面加载时检查本地存储的token
        window.onload = function() {
            const savedToken = localStorage.getItem('giteeToken');
            if (savedToken) {
                document.getElementById('giteeToken').value = savedToken;
            }
        };

        // 保存token到本地存储
        document.getElementById('giteeToken').addEventListener('change', function() {
            localStorage.setItem('giteeToken', this.value);
        });
    </script>
</body>
</html>
